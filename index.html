<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a2e38;min-height:100vh;font-family:Arial,Helvetica,sans-serif;}
#root{min-height:100vh;background:#0a2e38;padding:12px;}
#game-frame{position:relative;z-index:1;max-width:580px;margin:0 auto;padding:16px;border:2px solid #B8860B;border-radius:12px;background:#87CEEB;box-shadow:0 0 24px rgba(184,134,11,0.25);}
#logo-wrap{position:absolute;top:10px;right:12px;width:clamp(90px,22vw,140px);z-index:10;}
#logo-wrap img{width:100%;height:auto;display:block;border-radius:6px;}
.setup-title{font-size:clamp(18px,4vw,24px);font-weight:700;color:#0a2e38;margin-bottom:4px;padding-right:clamp(95px,23vw,150px);}
.setup-sub{font-size:clamp(13px,3vw,15px);color:#1a5070;margin-bottom:16px;padding-right:clamp(95px,23vw,150px);}
.setup-card{background:rgba(255,255,255,0.45);border:1px solid rgba(255,255,255,0.7);border-radius:10px;padding:14px 16px;margin-bottom:12px;}
.section-title{font-size:clamp(11px,2.5vw,13px);font-weight:700;color:#0a2e38;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
.chip-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.chip{padding:7px 12px;border-radius:20px;border:1px solid rgba(10,46,56,0.3);background:rgba(255,255,255,0.5);color:#0a2e38;font-size:clamp(12px,3vw,14px);cursor:pointer;user-select:none;}
.chip.active{background:#0a2e38;border-color:#0a2e38;color:#6de08a;font-weight:700;}
.chip:hover:not(.active){background:rgba(255,255,255,0.7);}
.timer-options{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.timer-toggle{display:flex;align-items:center;gap:8px;font-size:clamp(13px,3vw,15px);color:#0a2e38;cursor:pointer;font-weight:600;}
.timer-secs{display:flex;gap:6px;flex-wrap:wrap;}
.sec-chip{padding:6px 12px;border-radius:16px;border:1px solid rgba(10,46,56,0.3);background:rgba(255,255,255,0.5);color:#0a2e38;font-size:clamp(12px,3vw,14px);cursor:pointer;font-weight:600;}
.sec-chip.active{background:#0a2e38;border-color:#0a2e38;color:#6de08a;font-weight:700;}
.start-btn{width:100%;padding:15px;font-size:clamp(15px,3.5vw,17px);font-weight:700;border-radius:8px;border:2px solid #B8860B;background:linear-gradient(135deg,#1a0a00,#2a1500);color:#F7C948;cursor:pointer;margin-top:8px;}
.start-btn:disabled{background:rgba(255,255,255,0.3);border-color:rgba(10,46,56,0.2);color:rgba(10,46,56,0.35);cursor:default;}
.warn{font-size:clamp(12px,3vw,14px);color:#1a5070;text-align:center;margin-top:8px;min-height:18px;}
.count-info{font-size:clamp(12px,3vw,14px);color:#1a5070;margin-bottom:8px;}
.game-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;padding-right:clamp(95px,23vw,150px);}
.score-box{display:flex;gap:8px;}
.metric{background:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.8);border-radius:8px;padding:6px 12px;text-align:center;}
.metric-label{font-size:clamp(10px,2.5vw,12px);color:#1a5070;font-weight:600;}
.metric-value{font-size:clamp(16px,3.5vw,20px);font-weight:700;color:#0a2e38;}
.back-mini{font-size:clamp(12px,3vw,14px);padding:8px 12px;border-radius:8px;border:1px solid rgba(10,46,56,0.3);background:rgba(255,255,255,0.5);cursor:pointer;color:#0a2e38;font-weight:600;white-space:nowrap;}
.progress{font-size:clamp(11px,2.5vw,13px);color:#1a5070;text-align:right;margin-bottom:5px;font-weight:600;}
.tbar-wrap{background:rgba(255,255,255,0.4);border-radius:4px;height:6px;margin-bottom:10px;overflow:hidden;}
#tbar{height:6px;border-radius:4px;background:#0a2e38;transition:width .1s linear,background .3s;width:100%;}
.question-card{background:rgba(255,255,255,0.5);border:2px solid rgba(255,255,255,0.8);border-radius:10px;padding:clamp(12px,3vw,20px);margin-bottom:10px;}
.tag{display:inline-block;font-size:clamp(10px,2.5vw,12px);padding:3px 10px;border-radius:6px;font-weight:700;margin-bottom:10px;}
.tag-g{background:#0a2e38;color:#6de08a;}
.tag-t{background:#1a5070;color:#a0d8f0;margin-left:6px;}
.qlabel{font-size:clamp(14px,3.5vw,18px);color:#0d6b3a;margin-bottom:4px;font-weight:700;}
.qverb{font-size:clamp(22px,6vw,32px);font-weight:700;color:#8B1A1A;letter-spacing:.06em;text-align:center;margin-bottom:14px;text-shadow:-1px -1px 0 rgba(255,255,255,0.6),1px -1px 0 rgba(255,255,255,0.6),-1px 1px 0 rgba(255,255,255,0.6),1px 1px 0 rgba(255,255,255,0.6);}
.slabel{font-size:clamp(14px,3.5vw,18px);color:#0d6b3a;margin-bottom:4px;font-weight:700;}
.sval{font-size:clamp(20px,5vw,28px);font-weight:700;color:#8B1A1A;letter-spacing:.06em;text-align:center;margin-bottom:16px;text-shadow:-1px -1px 0 rgba(255,255,255,0.6),1px -1px 0 rgba(255,255,255,0.6),-1px 1px 0 rgba(255,255,255,0.6),1px 1px 0 rgba(255,255,255,0.6);}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cbtn{background:rgba(255,255,255,0.55);border:2px solid rgba(10,46,56,0.25);border-radius:8px;padding:clamp(12px,3vw,16px) 8px;font-size:clamp(13px,3.5vw,17px);font-weight:700;color:#0a2e38;cursor:pointer;text-align:center;font-family:Arial,Helvetica,sans-serif;line-height:1.3;}
.cbtn.correct{background:#c8f0c8;border-color:#2a8a2a;color:#0a3a0a;}
.cbtn.wrong{background:#4A1B0C;border-color:#8B1A1A;color:#F5C4B3;}
.cbtn:disabled{cursor:default;}
.feedback{min-height:30px;text-align:center;font-size:clamp(13px,3.5vw,16px);font-weight:700;margin-bottom:10px;color:#1a5070;}
.feedback.ok{color:#B8860B;}
.feedback.ko{color:#8B1A1A;}
.nxtbtn{width:100%;padding:clamp(11px,3vw,14px);font-size:clamp(13px,3.5vw,16px);border-radius:8px;border:2px solid rgba(10,46,56,0.3);background:rgba(255,255,255,0.5);color:#0a2e38;cursor:pointer;font-weight:700;}
.end-screen{text-align:center;padding:clamp(12px,4vw,24px) clamp(8px,3vw,16px);}
.end-screen h2{font-size:clamp(18px,5vw,26px);font-weight:700;margin-bottom:6px;color:#0a2e38;}
.end-sub{font-size:clamp(12px,3.5vw,15px);color:#1a5070;margin-bottom:14px;line-height:1.5;font-weight:600;}
.stars-row{font-size:clamp(28px,8vw,42px);margin-bottom:12px;letter-spacing:4px;}
.stars-row span.lit{color:#B8860B;}
.stars-row span.dim{color:rgba(10,46,56,0.2);}
.stars-row span.blink{animation:blink .6s infinite alternate;}
@keyframes blink{from{color:rgba(10,46,56,0.2)}to{color:#F7C948}}
.end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:12px;}
.restart-btn{font-size:clamp(13px,3.5vw,15px);padding:11px 22px;border-radius:8px;border:2px solid rgba(10,46,56,0.3);background:rgba(255,255,255,0.5);cursor:pointer;color:#0a2e38;font-weight:700;}
.change-btn{font-size:clamp(13px,3.5vw,15px);padding:11px 22px;border-radius:8px;border:2px solid #B8860B;background:linear-gradient(135deg,#1a0a00,#2a1500);color:#F7C948;cursor:pointer;font-weight:700;}
.final-metrics{display:flex;gap:10px;justify-content:center;margin-bottom:12px;}
</style>
</head>
